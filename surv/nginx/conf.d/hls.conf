# nginx/conf.d/hls.conf
# Proxies HLS streams from MediaMTX and snapshots from MinIO.
#
# MediaMTX (hlsAllowOrigins: ["*"]) echoes the request's Origin header back
# as its own Access-Control-Allow-Origin. Nginx's add_header then appends a
# SECOND Access-Control-Allow-Origin on top instead of replacing it. Browsers
# reject responses with multiple ACAO header values as a CORS violation.
#
# Fix: strip MediaMTX's CORS headers with proxy_hide_header before nginx
# adds its own, single, authoritative set.
#
# MediaMTX's 302 cookie-check redirect uses a bare "/" relative Location
# header with no awareness of the /hls/ proxy prefix or external port — we
# rewrite it into a fully-qualified absolute URL so nginx doesn't silently
# re-resolve it and drop the port.

server {
    listen 80;
    server_name _;

    location /health {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location /hls/ {
        proxy_pass         http://mediamtx:8888/;
        proxy_http_version 1.1;
        proxy_set_header   Host $http_host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;

        # Absolute redirect rewrite — keeps scheme + port + /hls/ prefix
        proxy_redirect / $scheme://$http_host/hls/;

        # Strip MediaMTX's own CORS / credentials headers so nginx's
        # add_header below is the ONLY source — prevents duplicate
        # Access-Control-Allow-Origin headers that browsers reject outright
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Credentials;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;

        proxy_pass_header Set-Cookie;

        # Single authoritative CORS policy
        add_header Access-Control-Allow-Origin  * always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Cache-Control                "no-cache, no-store" always;

        types {
            application/vnd.apple.mpegurl m3u8;
            video/mp2t                    ts;
            video/mp4                     mp4;
        }
    }

    location /snapshots/ {
        proxy_pass       http://minio:9000/snapshots/;
        proxy_set_header Host $host;
    }
}