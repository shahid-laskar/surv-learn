# nginx/conf.d/frontend.conf
# Serves the React SPA. Falls back to index.html for client-side routing.

server {
    listen 80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # Health check
    location /health {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Static assets — long cache
    location /assets/ {
        expires     1y;
        add_header  Cache-Control "public, immutable";
    }

    # Proxy API calls to FastAPI — avoids CORS issues in production
    location /api/ {
        proxy_pass         http://app:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # React SPA — all unknown paths fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
