networks:
  surv_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  hls_segments:
  recordings:
  minio_data:

# ─────────────────────────────────────────────────────────────────────────────
# INFRASTRUCTURE
# ─────────────────────────────────────────────────────────────────────────────
services:
  postgres:
    image: postgres:16
    container_name: surv_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - surv_net
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout:  5s
      retries:  5

  redis:
    image: redis:7-alpine
    container_name: surv_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    networks:
      - surv_net
    healthcheck:
      test:     ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout:  5s
      retries:  5
  # ─────────────────────────────────────────────────────────────────────────
  # KONG API GATEWAY
  # ─────────────────────────────────────────────────────────────────────────
  kong-db-init:
    image: postgres:16
    container_name: surv_kong_db_init
    networks:
      - surv_net
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
    entrypoint: >
      /bin/sh -c "
        until pg_isready -h postgres -U ${POSTGRES_USER}; do sleep 2; done;
        psql -h postgres -U ${POSTGRES_USER} -d ${POSTGRES_DB} -tc \"SELECT 1 FROM pg_database WHERE datname = 'kong'\" | grep -q 1 || psql -h postgres -U ${POSTGRES_USER} -d ${POSTGRES_DB} -c 'CREATE DATABASE kong;';
        echo 'Kong database ready';
      "
    depends_on:
      postgres:
        condition: service_healthy

  kong-migration:
    image: kong:3.6
    container_name: surv_kong_migration
    networks:
      - surv_net
    command: kong migrations bootstrap
    environment:
      KONG_DATABASE:    postgres
      KONG_PG_HOST:     postgres
      KONG_PG_USER:     ${POSTGRES_USER}
      KONG_PG_PASSWORD: ${POSTGRES_PASSWORD}
      KONG_PG_DATABASE: kong
    depends_on:
      kong-db-init:
        condition: service_completed_successfully
    restart: on-failure

  kong:
    image: kong:3.6
    container_name: surv_kong
    restart: unless-stopped
    networks:
      - surv_net
    ports:
      - "${KONG_PROXY_PORT}:8000"
      - "${KONG_PROXY_SSL_PORT}:8443"
      - "${KONG_ADMIN_PORT}:8001"
    environment:
      KONG_DATABASE:        postgres
      KONG_PG_HOST:         postgres
      KONG_PG_USER:         ${POSTGRES_USER}
      KONG_PG_PASSWORD:     ${POSTGRES_PASSWORD}
      KONG_PG_DATABASE:     kong
      KONG_PROXY_LISTEN:    0.0.0.0:8000
      KONG_ADMIN_LISTEN:    0.0.0.0:8001
      KONG_PLUGINS:         bundled,jwt
      KONG_LOG_LEVEL:       info
    depends_on:
      kong-migration:
        condition: service_completed_successfully
    healthcheck:
      test:     ["CMD", "kong", "health"]
      interval: 10s
      timeout:  10s
      retries:  10
      start_period: 15s

  kong-config:
    image: curlimages/curl:8.8.0
    container_name: surv_kong_config
    networks:
      - surv_net
    volumes:
      - ./kong/setup-kong-jwt.sh:/setup-kong-jwt.sh:ro
    entrypoint: ["/bin/sh", "/setup-kong-jwt.sh"]
    environment:
      KONG_JWT_ISSUER: ${KONG_JWT_ISSUER}
      KONG_JWT_SECRET: ${KONG_JWT_SECRET}
    depends_on:
      kong:
        condition: service_healthy

  konga:
    image: pantsel/konga:latest
    container_name: surv_konga
    restart: unless-stopped
    networks:
      - surv_net
    ports:
      - "1337:1337"
    environment:
      DB_ADAPTER: postgres
      DB_HOST:    postgres
      DB_USER:    ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_DATABASE: konga
      NODE_ENV:   production
    depends_on:
      kong:
        condition: service_healthy

  kafka:
    image: apache/kafka:3.7.0
    container_name: surv_kafka
    restart: unless-stopped
    networks:
      - surv_net
    ports:
      - "${KAFKA_PORT}:9092"
    environment:
      KAFKA_NODE_ID:                                1
      KAFKA_PROCESS_ROLES:                          broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS:               1@surv_kafka:9093
      KAFKA_LISTENERS:                              PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS:                   PLAINTEXT://surv_kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP:         PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES:              CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME:             PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR:       1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR:          1
      CLUSTER_ID:                                   5L6g3nShT-eMCtK--X86sw
    healthcheck:
      test:         ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval:     15s
      timeout:      10s
      retries:      10
      start_period: 30s

  kafka_init:
    image: apache/kafka:3.7.0
    container_name: surv_kafka_init
    restart: "no"
    networks:
      - surv_net
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server surv_kafka:9092 --create --if-not-exists --topic camera.motion    --partitions 3 --replication-factor 1;
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server surv_kafka:9092 --create --if-not-exists --topic camera.status    --partitions 3 --replication-factor 1;
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server surv_kafka:9092 --create --if-not-exists --topic recording.segments --partitions 3 --replication-factor 1;
        echo 'Topics ready:';
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server surv_kafka:9092 --list;
      "

  kafka_ui:
    image: provectuslabs/kafka-ui:latest
    container_name: surv_kafka_ui
    restart: unless-stopped
    networks:
      - surv_net
    ports:
      - "${KAFKA_UI_PORT}:8080"
    environment:
      # Must match KAFKA_ADVERTISED_LISTENERS — surv_kafka, not kafka
      KAFKA_CLUSTERS_0_NAME:             surv
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: surv_kafka:9092
    depends_on:
      kafka:
        condition: service_healthy

# ─────────────────────────────────────────────────────────────────────────────
# OBJECT STORAGE
# ─────────────────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: surv_minio
    command: server /data --console-address ":9001"
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - surv_net
    healthcheck:
      test:     ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout:  20s
      retries:  3

  minio_init:
    image: minio/mc:latest
    container_name: surv_minio_init
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
        mc mb local/recordings --ignore-existing;
        mc mb local/snapshots  --ignore-existing;
        echo 'MinIO buckets ready';
      "
    networks:
      - surv_net

# ─────────────────────────────────────────────────────────────────────────────
# MEDIA SERVER
# ─────────────────────────────────────────────────────────────────────────────
  mediamtx:
    build:
      context:    .
      dockerfile: Dockerfile.mediamtx
    container_name: surv_mediamtx
    restart: unless-stopped
    environment:
      MINIO_ENDPOINT:           minio:9000
      MINIO_ACCESS_KEY:         ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY:         ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET:             recordings
      SEGMENT_DURATION_SECONDS: ${SEGMENT_DURATION_SECONDS}
      KAFKA_BOOTSTRAP_SERVERS:  surv_kafka:9092
    networks:
      - surv_net
    ports:
      - "${MEDIAMTX_RTSP_PORT}:8554"
      - "${MEDIAMTX_HLS_PORT}:8888"
      - "${MEDIAMTX_WEBRTC_PORT}:8889"
      - "8189:8189/udp"
      - "${MEDIAMTX_API_PORT}:9997"
    volumes:
      - ./mediamtx/mediamtx.yml:/mediamtx.yml:ro
      - hls_segments:/var/hls
      - ./recordings:/recordings
      - ./scripts:/scripts
      - ./workers/upload_to_minio.py:/app/upload_to_minio.py:ro
    depends_on:
      minio:
        condition: service_healthy
      kafka:
        condition: service_healthy

# ─────────────────────────────────────────────────────────────────────────────
# NGINX — HLS proxy (port 8080) + Frontend SPA (port 3000)
# ─────────────────────────────────────────────────────────────────────────────
  nginx_hls:
    image: nginx:1.27-alpine
    container_name: surv_nginx_hls
    restart: unless-stopped
    networks:
      - surv_net
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d/hls.conf:/etc/nginx/conf.d/hls.conf:ro
      - ./nginx/empty.conf:/etc/nginx/conf.d/default.conf:ro
      - hls_segments:/var/hls:ro
    depends_on:
      - mediamtx

  frontend:
    build:
      context:    .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000/api/v1}
        VITE_HLS_BASE:     ${VITE_HLS_BASE:-http://localhost:8080/hls}
        VITE_WEBRTC_BASE:  ${VITE_WEBRTC_BASE:-http://localhost:8889}
    container_name: surv_frontend
    restart: unless-stopped
    networks:
      - surv_net
    ports:
      - "3000:80"
    depends_on:
      - app
      - nginx_hls

# ─────────────────────────────────────────────────────────────────────────────
# FASTAPI APPLICATION
# ─────────────────────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: app/Dockerfile
    container_name: surv_app
    restart: unless-stopped
    networks:
      - surv_net
    # NOTE: port 8000 is intentionally NOT published to the host anymore.
    # Kong (also on :8000, but on the HOST) is now the only public entry
    # point — see Phase 7. FastAPI is reachable only inside the Docker
    # network at http://app:8000, which Kong's "surv-api" service proxies to.
    # For direct debugging, use: docker compose exec app curl localhost:8000/health
    environment:
      DATABASE_URL:             postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      SYNC_DATABASE_URL:        postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      MINIO_ENDPOINT:           ${MINIO_ENDPOINT}
      MINIO_ACCESS_KEY:         ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY:         ${MINIO_ROOT_PASSWORD}
      MINIO_EXTERNAL_URL:       ${MINIO_EXTERNAL_URL}
      MINIO_BUCKET_RECORDINGS:  ${MINIO_BUCKET_RECORDINGS}
      MINIO_BUCKET_SNAPSHOTS:   ${MINIO_BUCKET_SNAPSHOTS}
      MEDIAMTX_API_URL:         ${MEDIAMTX_API_URL}
      MEDIAMTX_HLS_BASE:        ${MEDIAMTX_HLS_BASE}
      MEDIAMTX_WEBRTC_BASE:     ${MEDIAMTX_WEBRTC_BASE}
      KAFKA_BOOTSTRAP_SERVERS:  ${KAFKA_BOOTSTRAP_SERVERS}
      KONG_JWT_ISSUER:          ${KONG_JWT_ISSUER}
      KONG_JWT_SECRET:          ${KONG_JWT_SECRET}
      ALGORITHM:                ${ALGORITHM}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
      DEBUG:                    ${DEBUG}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy

  # Runs Alembic migrations then exits — must complete before app handles requests
  db_migrate:
    build:
      context:    .
      dockerfile: app/Dockerfile
    container_name: surv_db_migrate
    restart: "no"
    networks:
      - surv_net
    command: alembic upgrade head
    environment:
      SYNC_DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    depends_on:
      postgres:
        condition: service_healthy

  segment_db_consumer:
    build:
      context:    .
      dockerfile: app/Dockerfile
    container_name: surv_segment_consumer
    restart: unless-stopped
    networks:
      - surv_net
    command: python workers/segment_db_consumer.py
    environment:
      DATABASE_URL:            postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      KAFKA_BOOTSTRAP_SERVERS: surv_kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

# ─────────────────────────────────────────────────────────────────────────────
# CAMERA WORKERS
# ─────────────────────────────────────────────────────────────────────────────
  onvif_producer:
    build:
      context:    .
      dockerfile: onvif_producer/Dockerfile
    container_name: surv_onvif_producer
    restart: unless-stopped
    networks:
      - surv_net
    environment:
      DATABASE_URL:               ${DATABASE_URL}
      KAFKA_BOOTSTRAP_SERVERS:    surv_kafka:9092
      ONVIF_USERNAME:             ${ONVIF_USERNAME}
      ONVIF_PASSWORD:             ${ONVIF_PASSWORD}
      ONVIF_PORT:                 ${ONVIF_PORT}
      DISCOVERY_INTERVAL_SECONDS: "60"
      ONVIF_PULL_TIMEOUT:         "10"
      ONVIF_SUB_DURATION:         "PT60M"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  motion_consumer:
    build:
      context:    .
      dockerfile: motion_consumer/Dockerfile
    container_name: surv_motion_consumer
    restart: unless-stopped
    networks:
      - surv_net
    environment:
      DATABASE_URL:            ${DATABASE_URL}
      KAFKA_BOOTSTRAP_SERVERS: surv_kafka:9092
      KAFKA_GROUP_ID:          motion-consumer-group
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  status_monitor:
    build:
      context:    .
      dockerfile: Dockerfile.worker
    container_name: surv_status_monitor
    restart: unless-stopped
    networks:
      - surv_net
    command: python status_monitor.py
    environment:
      DATABASE_URL:                 ${DATABASE_URL}
      KAFKA_BOOTSTRAP_SERVERS:      surv_kafka:9092
      MEDIAMTX_API_URL:             http://mediamtx:9997
      STATUS_PING_INTERVAL_SECONDS: "30"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      mediamtx:
        condition: service_started

  snapshotter:
    build:
      context:    .
      dockerfile: Dockerfile.worker
    container_name: surv_snapshotter
    restart: unless-stopped
    networks:
      - surv_net
    command: python snapshot_worker.py
    environment:
      MINIO_ENDPOINT:            minio:9000
      MINIO_ACCESS_KEY:          ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY:          ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET_SNAPSHOTS:    snapshots
      MEDIAMTX_RTSP_URL:         rtsp://mediamtx:8554
      CAMERA_PATHS:              ${CAMERA_PATHS:-CAMKRTVM00001}
      SNAPSHOT_INTERVAL_SECONDS: "30"
    depends_on:
      minio:
        condition: service_healthy
      minio_init:
        condition: service_completed_successfully
