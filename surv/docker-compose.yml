networks:
  surv_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:  
  hls_segments:
  recordings:
  minio_data:

services:
  postgres:
    image: postgres:16
    container_name: surv_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - surv_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: surv_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    networks:
      - surv_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:3.7.0
    container_name: surv_kafka
    restart: unless-stopped
    networks:
      - surv_net
    ports:
      - "${KAFKA_PORT}:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@surv_kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://surv_kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: 5L6g3nShT-eMCtK--X86sw
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  kafka_init:
    image: apache/kafka:3.7.0
    container_name: surv_kafka_init
    restart: "no"
    networks:
      - surv_net
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server surv_kafka:9092 --create --if-not-exists --topic camera.motion --partitions 3 --replication-factor 1;
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server surv_kafka:9092 --create --if-not-exists --topic camera.status --partitions 3 --replication-factor 1;
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server surv_kafka:9092 --create --if-not-exists --topic recording.segments --partitions 3 --replication-factor 1;
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server surv_kafka:9092 --list;
      "

  kafka_ui:
    image: provectuslabs/kafka-ui:latest
    container_name: surv_kafka_ui
    restart: unless-stopped
    networks:
      - surv_net
    ports:
      - "${KAFKA_UI_PORT}:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: surv
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy

  mediamtx:
    build:
      context: .
      dockerfile: Dockerfile.mediamtx
    container_name: surv_mediamtx
    restart: unless-stopped
    environment:
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: recordings
      SEGMENT_DURATION_SECONDS: ${SEGMENT_DURATION_SECONDS}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    networks:
      - surv_net
    ports:
      - "${MEDIAMTX_RTSP_PORT}:8554"
      - "${MEDIAMTX_HLS_PORT}:8888"
      - "${MEDIAMTX_WEBRTC_PORT}:8889"
      - "8189:8189/udp"
      - "${MEDIAMTX_API_PORT}:9997"
    volumes:
      - ./mediamtx/mediamtx.yml:/mediamtx.yml:ro
      - hls_segments:/var/hls
      - ./recordings:/recordings
      - ./scripts:/scripts
      - ./workers/upload_to_minio.py:/app/upload_to_minio.py:ro
      - ./workers/test_presign.py:/app/test_presign.py:ro

  minio:
    image: minio/minio:latest
    container_name: surv_minio
    command: server /data --console-address ":9001"
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - surv_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
  
  minio_init:
    image: minio/mc:latest
    container_name: surv_minio_init
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};

        mc mb local/recordings --ignore-existing;
        mc mb local/snapshots --ignore-existing;

        echo 'Buckets initialized';
      "
    networks:
      - surv_net

  onvif_producer:
    build:
      context: .
      dockerfile: onvif_producer/Dockerfile
    container_name: surv_onvif_producer
    restart: unless-stopped
    networks:
      - surv_net
    environment:
      DATABASE_URL:            ${DATABASE_URL}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      ONVIF_USERNAME:          ${ONVIF_USERNAME}
      ONVIF_PASSWORD:          ${ONVIF_PASSWORD}
      ONVIF_PORT:              ${ONVIF_PORT}
      DISCOVERY_INTERVAL_SECONDS: "60"
      ONVIF_PULL_TIMEOUT:      "10"
      ONVIF_SUB_DURATION:      "PT60M"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  motion_consumer:
    build:
      context: .
      dockerfile: motion_consumer/Dockerfile
    container_name: surv_motion_consumer
    restart: unless-stopped
    networks:
      - surv_net
    environment:
      DATABASE_URL:            ${DATABASE_URL}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_GROUP_ID:          motion-consumer-group
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
  # uploader:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.worker
  #   container_name: surv_uploader
  #   restart: unless-stopped
  #   depends_on:
  #     minio:
  #       condition: service_healthy
  #     minio_init:
  #       condition: service_completed_successfully
  #   environment:
  #     MINIO_ENDPOINT: minio:9000
  #     MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
  #     MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
  #     MINIO_BUCKET: recordings      
  #   volumes:
  #     - ./recordings:/recordings
  #     - ./workers:/app
  #   networks:
  #     - surv_net
  snapshotter:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: surv_snapshotter
    restart: unless-stopped
    depends_on:
      minio:
        condition: service_healthy
      minio_init:
        condition: service_completed_successfully
    environment:
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET_SNAPSHOTS: snapshots
      MEDIAMTX_RTSP_URL: rtsp://mediamtx:8554
      CAMERA_PATHS: CAMKRTVM00001
      SNAPSHOT_INTERVAL_SECONDS: "30"
    networks:
      - surv_net
    command: python /app/snapshot_worker.py
    
  nginx_hls:
    image: nginx:1.27-alpine
    container_name: surv_nginx_hls
    restart: unless-stopped
    networks:
      - surv_net
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - hls_segments:/var/hls:ro
    depends_on:
      - mediamtx