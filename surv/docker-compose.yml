networks:
  surv_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:  
  hls_segments:
  recordings:
  minio_data:

services:
  postgres:
    image: postgres:16
    container_name: surv_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - surv_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: surv_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    networks:
      - surv_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mediamtx:
    build:
      context: .
      dockerfile: Dockerfile.mediamtx
    container_name: surv_mediamtx
    restart: unless-stopped
    environment:
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: recordings
      SEGMENT_DURATION_SECONDS: ${SEGMENT_DURATION_SECONDS}
    networks:
      - surv_net
    ports:
      - "${MEDIAMTX_RTSP_PORT}:8554"
      - "${MEDIAMTX_HLS_PORT}:8888"
      - "${MEDIAMTX_WEBRTC_PORT}:8889"
      - "8189:8189/udp"
      - "${MEDIAMTX_API_PORT}:9997"
    volumes:
      - ./mediamtx/mediamtx.yml:/mediamtx.yml:ro
      - hls_segments:/var/hls
      - ./recordings:/recordings
      - ./scripts:/scripts
      - ./workers/upload_to_minio.py:/app/upload_to_minio.py:ro
      - ./workers/test_presign.py:/app/test_presign.py:ro

  minio:
    image: minio/minio:latest
    container_name: surv_minio
    command: server /data --console-address ":9001"
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - surv_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
  
  minio_init:
    image: minio/mc:latest
    container_name: surv_minio_init
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};

        mc mb local/recordings --ignore-existing;
        mc mb local/snapshots --ignore-existing;

        echo 'Buckets initialized';
      "
    networks:
      - surv_net

  # uploader:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.worker
  #   container_name: surv_uploader
  #   restart: unless-stopped
  #   depends_on:
  #     minio:
  #       condition: service_healthy
  #     minio_init:
  #       condition: service_completed_successfully
  #   environment:
  #     MINIO_ENDPOINT: minio:9000
  #     MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
  #     MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
  #     MINIO_BUCKET: recordings      
  #   volumes:
  #     - ./recordings:/recordings
  #     - ./workers:/app
  #   networks:
  #     - surv_net
  snapshotter:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: surv_snapshotter
    restart: unless-stopped
    depends_on:
      minio:
        condition: service_healthy
      minio_init:
        condition: service_completed_successfully
    environment:
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET_SNAPSHOTS: snapshots
      MEDIAMTX_RTSP_URL: rtsp://mediamtx:8554
      CAMERA_PATHS: CAMKRTVM00001
      SNAPSHOT_INTERVAL_SECONDS: "30"
    networks:
      - surv_net
    command: python /app/snapshot_worker.py
    
  nginx_hls:
    image: nginx:1.27-alpine
    container_name: surv_nginx_hls
    restart: unless-stopped
    networks:
      - surv_net
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - hls_segments:/var/hls:ro
    depends_on:
      - mediamtx