# mediamtx/mediamtx.yml
# MediaMTX Configuration

# General
logLevel: info
logDestinations: [stdout]
logFile: ""

# ── Authentication ──────────────────────────────────────────────────────────
# Switched from "internal" (open to anyone) to "http" — every publish/read/
# playback attempt is validated by FastAPI's /api/v1/auth/stream webhook.
# Camera RTSP publish (internal network only) still needs no token since the
# webhook returns 200 unconditionally for "publish" actions — only read/
# playback (i.e. HLS/WebRTC viewers) are token-gated.
authMethod: http
authHTTPAddress: http://app:8000/api/v1/auth/stream
authHTTPExclude:
  - action: api
  - action: metrics
  - action: pprof

# Control API
api: true
apiAddress: :9997

# RTSP server
rtsp: true
rtspAddress: :8554
rtspEncryption: "no"
rtspServerKey: ""
rtspServerCert: ""

# RTMP server
rtmp: true
rtmpAddress: :1935
rtmpEncryption: "no"
rtmpServerKey: ""
rtmpServerCert: ""

# HLS server
hls: true
hlsAddress: :8888
hlsEncryption: false
hlsServerKey: ""
hlsServerCert: ""
hlsAllowOrigins:
  - "*"
hlsVariant: lowLatency
hlsSegmentCount: 7
hlsSegmentDuration: 1s
hlsPartDuration: 200ms
hlsSegmentMaxSize: 50M
hlsDirectory: /var/hls

# WebRTC server
webrtc: true
webrtcAddress: :8889
webrtcEncryption: false
webrtcServerKey: ""
webrtcServerCert: ""
webrtcAllowOrigins:
  - "*"
webrtcICEServers2: []

# Path defaults
pathDefaults:
  # Recording
  record: true
  recordPath: /recordings/%path/%Y/%m/%d/%H-%M-%S-%f
  recordFormat: fmp4
  recordPartDuration: 1s
  recordSegmentDuration: 60s
  recordDeleteAfter: 0s
  runOnReady: /scripts/camera_ready.sh
  runOnNotReady: /scripts/camera_down.sh

  # Upload to MinIO on record segment complete
  runOnRecordSegmentComplete: /scripts/notify_segment.sh

  # Source configuration
  sourceFingerprint: ""
  sourceRedirect: ""

# Paths (cameras will be added dynamically via API)
paths:
  CAMKRTVM00001:
    source: rtsp://admin:admin@10.44.0.219:554/unicaststream/1
    sourceProtocol: tcp
